<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
    }
    .container{
      height: 748px;
      width: 748px;
      background: #000;
      display: grid;
      grid-template-columns: 320px 351px 50px;
      grid-template-rows: 414px 305px 20px;

      gap: 9px;
    }
    .one{
      background: red;
      grid-column: 1;
      grid-row: 1;
    }
    .two{
      grid-column: 2/4;
      grid-row: 1;
      background: #f2f2f2;
    }
    .three{
      grid-column: 2/4;
      grid-row: 1;
    }
    .four{
      grid-row: 1;
      grid-column: 1;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="one"></div>
    <div class="two"></div>
    <div class="three"></div>
    <div class="four"></div>
    <div class="five"></div>
    <div class="six"></div>
    <div class="seven"></div>
    <div class="eight"></div>
    <div class="nine"></div>

  </div>
</body>

</html>
