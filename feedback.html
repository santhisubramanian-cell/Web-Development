<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 500px;
            
        }
        .container{
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            order: 1px solid #ccc;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            order: 1px solid #ccc;
        }

        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            order: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        h1{
            justify-content: center;
            align-items: center;
            display: flex;
        }

    </style>
</head>
<body>
    

    <div class="container">
        <h1>FeedBack Form</h1>
        <form id="userForm">
            <label for="">Name:</label>
            <input type="text" id="username" placeholder="enter your name">
            <label for="">Email:</label>
            <input type="email" id="password"  placeholder="enter your mail">
            <label for="">Message:</label>
            <textarea name="feedBack" placeholder="enter your feedBack"></textarea>
            <button type="submit" id="submitBtn">Submit</button>
            
        </form>

    </div>
    <script>
        document.getElementById("userForm").addEventListener("submit", function (event) {
  event.preventDefault(); // Prevent form from reloading the page

  // Create a FormData object from the form
  const formData = new FormData(event.target);
  const newEntry = {};

  // Convert FormData to a plain object
  formData.forEach((value, key) => {
    newEntry[key] = value.trim(); // Trim whitespace
  });

  // Get existing responses from localStorage or start with empty array
  const existingData = JSON.parse(localStorage.getItem("formResponse")) || [];

  // Add the new entry to the array
  existingData.push(newEntry);

  // Store updated array in localStorage
  localStorage.setItem("formResponse", JSON.stringify(existingData));

  alert("Form submitted and stored successfully!");

  // Optionally, clear the form
  event.target.reset();
});
    </script>
</body>
</html>
